name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y rpm-build python3-devel

      - name: Build .rpm
        run: |
          chmod +x build-rpm.sh
          ./build-rpm.sh

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm

  release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Debian / Ubuntu
            ```bash
            sudo dpkg -i tuskbar_*_amd64.deb
            sudo apt-get install -f  # install dependencies
            ```

            ### Fedora / RHEL
            ```bash
            sudo dnf install tuskbar-*.noarch.rpm
            ```

            ### From source
            ```bash
            git clone https://github.com/AchrafSoltani/Tuskbar.git
            cd Tuskbar
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt
            .venv/bin/python -m tuskbar
            ```
